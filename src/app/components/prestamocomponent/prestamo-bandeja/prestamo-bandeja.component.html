<div class="bandeja-container">
  <h2>📥 Solicitudes de Préstamo Pendientes</h2>

  <div *ngIf="listaPendientes.length === 0" class="sin-datos">
    <p>No existen solicitudes pendientes de aprobación en este momento.</p>
  </div>

  <table mat-table [dataSource]="listaPendientes" class="mat-elevation-z8" *ngIf="listaPendientes.length > 0">

    <ng-container matColumnDef="idLibro">
      <th mat-header-cell *matHeaderCellDef> ID Libro </th>
      <td mat-cell *matCellDef="let element"> {{ element.idLibro }} </td>
    </ng-container>

    <ng-container matColumnDef="idEstudiante">
      <th mat-header-cell *matHeaderCellDef> ID Estudiante </th>
      <td mat-cell *matCellDef="let element"> {{ element.idEstudiante }} </td>
    </ng-container>

    <ng-container matColumnDef="diasSolicitados">
      <th mat-header-cell *matHeaderCellDef> Días Solicitados </th>
      <td mat-cell *matCellDef="let element"> {{ element.diasSolicitados }} días </td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef> Acciones </th>
      <td mat-cell *matCellDef="let element">
        <button mat-raised-button color="primary" style="margin-right: 8px;" (click)="aprobarSolicitud(element.idPrestamo)">
          <mat-icon>check</mat-icon> Aprobar
        </button>
        <button mat-raised-button color="warn" (click)="rechazarSolicitud(element.idPrestamo)">
          <mat-icon>close</mat-icon> Rechazar
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columnasMostradas"></tr>
    <tr mat-row *matRowDef="let row; columns: columnasMostradas;"></tr>
  </table>
</div>
