<div class="contenedor-form">
  <h2>{{ esEdicion ? 'Editar Libro' : 'Nuevo Libro' }}</h2>

  <form [formGroup]="form">

    <div class="isbn-autocompletado" *ngIf="!esEdicion">
      <mat-form-field appearance="outline" class="field-isbn">
        <mat-label>ISBN</mat-label>
        <input matInput formControlName="isbn" placeholder="Ej: 9786123456789">
      </mat-form-field>
      <button mat-raised-button color="accent" (click)="buscarPorIsbn()" [disabled]="cargandoIsbn">
        <mat-spinner diameter="20" *ngIf="cargandoIsbn"></mat-spinner>
        <mat-icon *ngIf="!cargandoIsbn">auto_awesome</mat-icon>
        {{ cargandoIsbn ? 'Buscando...' : 'Autocompletar con ISBN' }}
      </button>
    </div>

    <div class="form-card">
      <div class="form-grid">

        <mat-form-field appearance="outline" *ngIf="esEdicion">
          <mat-label>ISBN</mat-label>
          <input matInput formControlName="isbn">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Título</mat-label>
          <input matInput formControlName="titulo">
          <mat-error *ngIf="form.get('titulo')?.hasError('required')">Obligatorio</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Autor</mat-label>
          <input matInput formControlName="autor">
          <mat-error *ngIf="form.get('autor')?.hasError('required')">Obligatorio</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Editorial</mat-label>
          <input matInput formControlName="editorial">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Año</mat-label>
          <input matInput type="number" formControlName="anio" placeholder="Ej: 2023">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Categoría</mat-label>
          <mat-select formControlName="categoria">
            <mat-option *ngFor="let cat of categorias" [value]="cat">{{ cat }}</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Stock disponible</mat-label>
          <input matInput type="number" formControlName="stock" min="0">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Stock total</mat-label>
          <input matInput type="number" formControlName="stockTotal" min="1">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Descripción</mat-label>
          <textarea matInput formControlName="descripcion" rows="3"></textarea>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>URL Recurso digital (opcional)</mat-label>
          <input matInput formControlName="recurso" placeholder="https://...">
        </mat-form-field>

        <div class="acciones">
          <button mat-stroked-button type="button" (click)="cancelar()">
            <mat-icon>arrow_back</mat-icon> Cancelar
          </button>
          <button mat-raised-button color="primary" type="button" (click)="guardar()">
            <mat-icon>save</mat-icon> {{ esEdicion ? 'Actualizar' : 'Registrar' }}
          </button>
        </div>

      </div>
    </div>

  </form>
</div>
